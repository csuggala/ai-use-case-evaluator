<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Use Case Portfolio Evaluator — Chandana Suggala</title>
<script src="/public/jspdf.min.js"></script>
<script src="/public/jspdf.autotable.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0A1628; color: #E8EDF2; min-height: 100vh; padding: 2rem 1rem; }
.container { max-width: 820px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 2rem; }
.header h1 { font-size: 26px; font-weight: 600; color: #fff; margin-bottom: 6px; letter-spacing: -0.02em; }
.header p { font-size: 14px; color: #6B8099; max-width: 560px; margin: 0 auto; line-height: 1.6; }
.progress { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 2rem; }
.step { display: flex; align-items: center; gap: 8px; }
.step-num { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; border: 2px solid; transition: all 0.3s; }
.step-num.active { background: #4B9EF4; border-color: #4B9EF4; color: #fff; }
.step-num.done { background: #22C55E; border-color: #22C55E; color: #fff; }
.step-num.inactive { background: transparent; border-color: #1E3347; color: #4A6070; }
.step-label { font-size: 12px; font-weight: 500; }
.step-label.active { color: #4B9EF4; }
.step-label.done { color: #22C55E; }
.step-label.inactive { color: #4A6070; }
.step-line { width: 40px; height: 2px; background: #1E3347; margin: 0 4px; }
.step-line.done { background: #22C55E; }
/* Review page styles */
.review-card { background: #112036; border: 1px solid #1E3347; border-radius: 12px; padding: 1.25rem; margin-bottom: 10px; }
.review-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.review-card-title { font-size: 14px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 8px; }
.review-rank { width: 24px; height: 24px; border-radius: 50%; background: #1E3347; color: #9EB3C8; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.review-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.review-field { display: flex; flex-direction: column; gap: 2px; }
.review-field-label { font-size: 10px; font-weight: 600; color: #6B8099; text-transform: uppercase; letter-spacing: 0.06em; }
.review-field-val { font-size: 12px; color: #9EB3C8; line-height: 1.5; }
